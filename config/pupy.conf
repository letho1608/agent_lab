# Bật Web UI khi chạy server từ thư mục này (bind localhost)
[pupyd]
webserver = true

[webserver]
listen = 127.0.0.1:9000
# auth_token = <chuỗi bí mật>  → nếu set, truy cập từ IP khác local cần header X-Auth-Token hoặc ?token=
# rate_limit_per_minute = 60   → giới hạn request/phút theo IP (0 = tắt)
# kill_port_before_bind = false → true = kill process đang chiếm port trước khi bind Web UI
